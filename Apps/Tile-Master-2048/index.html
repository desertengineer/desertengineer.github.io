<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A192F">
    <meta name="google-adsense-account" content="ca-pub-2658659289706339">
    <title>Tile Master 2048</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2658659289706339"
     crossorigin="anonymous"></script>
      <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="index.css" />
    <link rel="manifest" href="./manifest.json" />
</head>

<body>

    <div class="main-wrapper">
        <!-- Top Controls -->
        <div class="top-controls">
            <div class="info-box">
                <span class="info-label">Score</span>
                <span id="score" class="info-value">0</span>
            </div>

            <div class="info-box">
                <span class="info-label">Best</span>
                <span id="best-score" class="info-value">0</span>
            </div>

            <button id="new-game-btn" class="btn btn-primary">
                New Game
            </button>

            <button id="sound-btn" class="btn btn-secondary"
                style="display: flex; align-items: center; justify-content: center;" title="Toggle Sound">
                <svg id="icon-sound-on" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                </svg>
                <svg id="icon-sound-off" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    style="display: none;">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <line x1="23" y1="9" x2="17" y2="15"></line>
                    <line x1="17" y1="9" x2="23" y2="15"></line>
                </svg>
            </button>
        </div>

        <!-- Game Grid Canvas -->
        <div class="game-container" id="grid">
            <!-- Background Cells -->
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>
            <div class="grid-cell"></div>

            <!-- Tiles container -->
            <div id="tiles-container">
                <!-- Dynamically populated by JS -->
            </div>

            <!-- Message Overlay -->
            <div id="message-overlay" class="overlay">
                <h2 id="message-title"></h2>
                <p id="message-subtitle"></p>
                <div class="overlay-buttons">
                    <button id="continue-btn" class="btn btn-secondary" style="display: none;">Continue</button>
                    <button id="overlay-new-game-btn" class="btn btn-primary">Try Again</button>
                </div>
            </div>
        </div>

        <!-- Instructions -->
        <div class="instructions">
            <h2>How to play:</h2>
            <p>
                Use your <strong>arrow keys</strong> or <strong>swipe</strong> on the grid to move the tiles. Tiles with
                the same number merge into one when they touch. Add them up to reach <strong>2048</strong>!
            </p>
        </div>
    </div>

    <script src="index.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            // Using folder-relative pathing to guarantee clean subdirectory registration compatibility
            navigator.serviceWorker.register('./service-worker.js')
                .then(() => console.log('PWA active'))
                .catch(err => console.log('PWA error:', err));
        }
    </script>

</body>

</html>
