<svg xmlns="http://w3.org" viewBox="0 0 1200 675" width="100%" height="100%">
  <defs>
    <!-- Sharp Drop Shadow for the Inner Tablet Display Mockup -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="15" dy="20" stdDeviation="15" flood-color="#051730" flood-opacity="0.4"/>
    </filter>
    
    <!-- Linear Gradients for Isometric App Icons -->
    <linearGradient id="grad-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5cdb5c"/>
      <stop offset="100%" stop-color="#28a745"/>
    </linearGradient>
    <linearGradient id="grad-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3399ff"/>
      <stop offset="100%" stop-color="#0056b3"/>
    </linearGradient>
    <linearGradient id="grad-orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb84d"/>
      <stop offset="100%" stop-color="#ff8800"/>
    </linearGradient>
    <linearGradient id="grad-red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6666"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <linearGradient id="grad-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cc33ff"/>
      <stop offset="100%" stop-color="#8800cc"/>
    </linearGradient>
    <linearGradient id="grad-yellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffee55"/>
      <stop offset="100%" stop-color="#cccc00"/>
    </linearGradient>
  </defs>

  <!-- Main Dark Blue Section (Bottom Background Layer) -->
  <rect width="1200" height="675" fill="#00439c" />

  <!-- Top Light Blue Section Container Card -->
  <rect x="0" y="0" width="1200" height="450" rx="30" ry="30" fill="#e1f0ff" stroke="#ffb13b" stroke-width="8" />
  <!-- Crop bottom rounded corners of the top section by drawing a clean masking square -->
  <rect x="0" y="420" width="1200" height="32" fill="#e1f0ff" />
  <!-- Thick Gold Boundary Line Accent Separating Sections -->
  <line x1="0" y1="450" x2="1200" y2="450" stroke="#ffb13b" stroke-width="8" />

  <!-- LEFT HERO TYPOGRAPHY -->
  <text x="270" y="210" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="44" fill="#111111" text-anchor="middle">Amazing apps made</text>
  <text x="270" y="275" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="44" fill="#111111" text-anchor="middle">with passion</text>

  <!-- RIGHT SIDE: ISOMETRIC TABLET DEVICE MOCKUP -->
  <g transform="translate(680, 50)" filter="url(#shadow)">
    <!-- Dark Grey Outer Tablet Bezel Framework -->
    <path d="M 120,40 L 400,105 C 415,110 420,125 410,140 L 310,360 C 305,370 290,375 275,370 L -5,305 C -20,300 -25,285 -15,270 L 85,50 C 90,40 105,35 120,40 Z" fill="#3c3d42" stroke="#222222" stroke-width="2" />
    
    <!-- Inner Screen Area Assembly -->
    <path d="M 125,52 L 388,113 C 395,115 398,122 393,130 L 298,348 C 295,354 287,357 280,355 L 18,294 C 11,292 8,285 13,277 L 108,59 C 112,53 120,50 125,52 Z" fill="#0066cc" />
    
    <!-- Home Button Element Detail -->
    <ellipse cx="155" cy="326" rx="9" ry="6" fill="#1a1a1a" transform="rotate(14, 155, 326)" />
    <ellipse cx="155" cy="326" rx="5" ry="3.5" fill="none" stroke="#666666" stroke-width="1" transform="rotate(14, 155, 326)" />

    <!-- SCREEN APP INTERFACE ICONS GRID (PERSPECTIVE MATCHED) -->
    <!-- Grid Column 1 -->
    <path d="M 120,80 L 155,88 L 140,123 L 105,115 Z" fill="url(#grad-orange)" />
    <path d="M 100,130 L 135,138 L 120,173 L 85,165 Z" fill="url(#grad-red)" />
    <path d="M 80,180 L 115,188 L 100,223 L 65,215 Z" fill="url(#grad-blue)" />

    <!-- Grid Column 2 -->
    <path d="M 175,93 L 210,101 L 195,136 L 160,128 Z" fill="url(#grad-green)" />
    <path d="M 155,143 L 190,151 L 175,186 L 140,178 Z" fill="url(#grad-blue)" />
    <path d="M 135,193 L 170,201 L 155,236 L 120,228 Z" fill="url(#grad-yellow)" />

    <!-- Grid Column 3 -->
    <path d="M 230,106 L 265,114 L 250,149 L 215,141 Z" fill="url(#grad-green)" />
    <path d="M 210,156 L 245,164 L 230,199 L 195,191 Z" fill="url(#grad-purple)" />
    <path d="M 190,206 L 225,214 L 210,249 L 175,241 Z" fill="url(#grad-orange)" />

    <!-- Grid Column 4 -->
    <path d="M 285,119 L 320,127 L 305,162 L 270,154 Z" fill="url(#grad-blue)" />
    <path d="M 265,169 L 300,177 L 285,212 L 250,204 Z" fill="url(#grad-green)" />
    <path d="M 245,219 L 280,227 L 265,262 L 230,254 Z" fill="url(#grad-green)" />

    <!-- POPPING / FLOATING 3D EFFECT ICONS AND ARROWS -->
    <!-- Red Floating Cam Element -->
    <g transform="translate(10, -50)">
      <path d="M 100,100 L 140,110 C 145,111 148,118 145,125 L 130,160 C 128,165 121,168 116,167 L 76,157 C 71,156 68,149 70,142 L 85,107 C 87,102 94,99 100,100 Z" fill="url(#grad-red)" />
      <polygon points="100,125 115,129 110,142 95,138" fill="#ffffff" />
      <polygon points="118,130 128,125 125,143 115,137" fill="#ffffff" />
    </g>
    <!-- Green Floating Lock Element -->
    <g transform="translate(120, -75)">
      <path d="M 100,100 L 140,110 C 145,111 148,118 145,125 L 130,160 C 128,165 121,168 116,167 L 76,157 C 71,156 68,149 70,142 L 85,107 C 87,102 94,99 100,100 Z" fill="url(#grad-green)" />
      <!-- Lock Shackle Arch Shape -->
      <path d="M 93,115 C 90,100 105,95 115,97 C 125,100 128,112 125,122" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
      <rect x="98" y="120" width="18" height="14" rx="3" fill="#ffffff" transform="rotate(14, 98, 120)" />
    </g>
    <!-- Floating Arrow Up (Left side green) -->
    <path d="M -5,170 L 10,174 L 5,195 L -5,193 Z" fill="url(#grad-green)" />
    <polygon points="-12,175 2,155 18,178" fill="#5cdb5c" />
    
    <!-- Floating Arrow Down (Middle pink) -->
    <g transform="translate(-110, 50)">
      <path d="M 220,50 L 235,54 L 230,75 L 215,71 Z" fill="url(#grad-purple)" />
      <polygon points="210,70 225,92 240,73" fill="#cc33ff" />
    </g>
  </g>

  <!-- CENTER LOWER LAYER: BRAND LOGO EMBLEM INSIDE CONTAINER -->
  <g transform="translate(478, 330)">
    <!-- Base Sharp Outer Frame Structure -->
    <rect width="244" height="234" fill="#141414" stroke="#ffb13b" stroke-width="2" />
    
    <circle cx="122" cy="117" r="95" fill="none" stroke="#ff973b" stroke-width="16" />
    
    <text x="88" y="126" font-family="Arial, sans-serif" font-weight="900" font-size="85" fill="#ffffff" text-anchor="middle">B</text>
    <text x="156" y="126" font-family="Arial, sans-serif" font-weight="900" font-size="85" fill="#ff973b" text-anchor="middle">S</text>
    <!-- Brand Label Metatext Info Elements -->
    <text x="122" y="168" font-family="Arial, sans-serif" font-weight="bold" font-size="11" fill="#ffffff" letter-spacing="1.8" text-anchor="middle">BEKEIRAT</text>
    <text x="122" y="184" font-family="Arial, sans-serif" font-weight="bold" font-size="11" fill="#ff973b" letter-spacing="1.8" text-anchor="middle">SOFTWARE</text>
  </g>

  <!-- BOTTOM FOOTER MAIN BRAND HEADER -->
  <text x="600" y="630" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="700" font-size="56" fill="#ffffff" text-anchor="middle">
    Bekeirat <tspan fill="#ffb84d">Software</tspan>
  </text>
</svg>
